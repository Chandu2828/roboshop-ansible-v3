- name: roboshop instances management
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "shipping", "payment", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: vnmurthy.online
    input: create
  tasks:
  - name: install python packages
    pip:
      name: "{{ item }}"
      state: present
    loop:
    - boto3
    - botocore
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      instance_type: t2.micro
      name: "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      security_groups: 
      - "roboshop-{{ item }}"
      - roboshop-common
    loop: "{{ instances }}"
    register: ec2_output
    when: input == "create"

  # - name: print output
  #   debug:
  #     msg: "{{ ec2_output }}"
  
  # - name: create route53 record
  #   debug:
  #     msg: "Instance Name: {{ item.item }} PrivateIP: {{ item.instances[0].private_ip_address }}"
  #   loop: "{{ ec2_output.results }}"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: input == "create"

  - name: create r53 record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      overwrite : true
    loop: "{{ ec2_output.results }}"
    when:
    - item.item == "frontend"
    - input == "create"
  
  - name: delete r53 records
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}.{{ domain_name }}"
      ttl: 1
      type: A
    loop: "{{ instances }}"
    when: input == "delete"
  
  - name: delete r53 record for frontend
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}"
      ttl: 1
      type: A
    loop: "{{ instances }}"
    when:
    - input == "delete"
    - item == "frontend"

  - name: delete ec2 instances
    amazon.aws.ec2_instance:
      state: absent
      name: "roboshop-{{ item }}"
      wait: false
    loop: "{{ instances }}"
    when: input == "delete"
